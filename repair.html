<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日常报修 - 宿舍后勤</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f6fa;
            color: #1a2332;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ===== 顶部导航（含返回按钮） ===== */
        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: #fff;
            padding: 18px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }
        .header a {
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
        }
        .header a:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        /* ===== 表单卡片 ===== */
        .form-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px 28px;
            border: 1px solid #e8ecf1;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .form-card h2 {
            font-size: 18px;
            margin-bottom: 18px;
            color: #1a2332;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
            color: #2c3e50;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            background: #fafbfc;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1a73e8;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .btn {
            background: #1a73e8;
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .btn:hover {
            background: #1557b0;
        }
        .btn:active {
            transform: scale(0.98);
        }

        /* ===== 报修列表 ===== */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .list-header h2 {
            font-size: 18px;
        }
        .list-header .count {
            background: #e8ecf1;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 14px;
            color: #4a5a6e;
        }
        .repair-item {
            background: #fff;
            border-radius: 10px;
            padding: 16px 20px;
            border: 1px solid #e8ecf1;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            transition: border-color 0.2s;
        }
        .repair-item:hover {
            border-color: #c5d5e8;
        }
        .repair-item .info {
            flex: 1;
            min-width: 150px;
        }
        .repair-item .info .room {
            font-weight: 600;
            color: #1a73e8;
            font-size: 15px;
        }
        .repair-item .info .desc {
            margin: 4px 0 2px;
            font-size: 15px;
        }
        .repair-item .info .meta {
            font-size: 13px;
            color: #6b7a8d;
        }
        .repair-item .status {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            margin-left: 12px;
        }
        .status-pending {
            background: #fff3e0;
            color: #e65100;
        }
        .status-done {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-processing {
            background: #e3f2fd;
            color: #0d47a1;
        }

        .empty-tip {
            text-align: center;
            color: #8a99aa;
            padding: 40px 0;
            font-size: 15px;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 16px;
            border-top: 1px solid #e8ecf1;
            color: #8a99aa;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .repair-item {
                flex-direction: column;
            }
            .repair-item .status {
                margin-left: 0;
                margin-top: 8px;
            }
            .header h1 {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ===== 顶部导航 ===== -->
        <header class="header">
            <h1>🔧 日常报修</h1>
            <a href="https://xiebaojuan0228-code.github.io/dormitory-workstation/">← 返回工作台</a>
        </header>

        <!-- ===== 报修表单 ===== -->
        <div class="form-card">
            <h2>📝 提交报修单</h2>
            <form id="repairForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="reporter">报修人 *</label>
                        <input type="text" id="reporter" placeholder="请输入姓名" required />
                    </div>
                    <div class="form-group">
                        <label for="room">房间号 *</label>
                        <input type="text" id="room" placeholder="如：302" required />
                    </div>
                </div>
                <div class="form-group">
                    <label for="category">报修类别</label>
                    <select id="category">
                        <option value="水电">水电</option>
                        <option value="家具" selected>家具</option>
                        <option value="电器">电器</option>
                        <option value="管道">管道</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">故障描述 *</label>
                    <textarea id="description" placeholder="请详细描述故障情况..." required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="urgency">紧急程度</label>
                        <select id="urgency">
                            <option value="低">低</option>
                            <option value="中" selected>中</option>
                            <option value="高">高</option>
                            <option value="紧急">紧急</option>
                        </select>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button type="submit" class="btn">📤 提交报修</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- ===== 报修记录列表 ===== -->
        <div class="list-header">
            <h2>📋 报修记录</h2>
            <span class="count" id="totalCount">共 0 条</span>
        </div>
        <div id="repairList">
            <!-- 动态渲染由 JavaScript 填充 -->
            <div class="empty-tip">暂无报修记录，快来提交第一单吧 📝</div>
        </div>

        <footer class="footer">
            © 2026 宿舍后勤管理系统 · 数据保存在浏览器本地
        </footer>
    </div>

    <script>
        // ============================================================
        // 1. 数据操作（localStorage）
        // ============================================================
        function getRepairs() {
            const data = localStorage.getItem('dormitory_repairs');
            return data ? JSON.parse(data) : [];
        }

        function saveRepairs(repairs) {
            localStorage.setItem('dormitory_repairs', JSON.stringify(repairs));
        }

        // ============================================================
        // 2. 生成唯一ID
        // ============================================================
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2, 6);
        }

        // ============================================================
        // 3. 渲染列表
        // ============================================================
        function renderList() {
            const repairs = getRepairs();
            const listContainer = document.getElementById('repairList');
            const totalCount = document.getElementById('totalCount');

            totalCount.textContent = `共 ${repairs.length} 条`;

            if (repairs.length === 0) {
                listContainer.innerHTML = `<div class="empty-tip">暂无报修记录，快来提交第一单吧 📝</div>`;
                return;
            }

            // 按时间从新到旧排序
            const sorted = [...repairs].reverse();

            let html = '';
            sorted.forEach(item => {
                // 状态样式映射
                let statusClass = 'status-pending';
                let statusText = '待处理';
                if (item.status === '处理中') {
                    statusClass = 'status-processing';
                    statusText = '处理中';
                } else if (item.status === '已处理') {
                    statusClass = 'status-done';
                    statusText = '已处理';
                }

                // 紧急程度标签
                const urgencyMap = { '低': '🟢', '中': '🟡', '高': '🟠', '紧急': '🔴' };
                const urgencyIcon = urgencyMap[item.urgency] || '🟡';

                html += `
                        <div class="repair-item">
                            <div class="info">
                                <div>
                                    <span class="room">${item.room}</span>
                                    <span style="margin-left: 8px; font-size:14px; color:#4a5a6e;">${item.category}</span>
                                    <span style="margin-left: 6px; font-size:13px;">${urgencyIcon}</span>
                                </div>
                                <div class="desc">${item.description}</div>
                                <div class="meta">
                                    👤 ${item.reporter} · ${item.time}
                                </div>
                            </div>
                            <div>
                                <span class="status ${statusClass}">${statusText}</span>
                                <button class="btn-status" data-id="${item.id}" style="margin-left: 6px; background: none; border: 1px solid #d0d7de; border-radius: 16px; padding: 2px 12px; font-size: 12px; cursor: pointer; color: #4a5a6e;">更新状态</button>
                            </div>
                        </div>
                    `;
            });

            listContainer.innerHTML = html;

            // 给所有"更新状态"按钮绑定事件
            document.querySelectorAll('.btn-status').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.dataset.id;
                    changeStatus(id);
                });
            });
        }

        // ============================================================
        // 4. 更改状态（循环：待处理 → 处理中 → 已处理）
        // ============================================================
        function changeStatus(id) {
            const repairs = getRepairs();
            const item = repairs.find(r => r.id === id);
            if (!item) return;

            const statusMap = {
                '待处理': '处理中',
                '处理中': '已处理',
                '已处理': '待处理' // 循环回去，方便演示
            };
            item.status = statusMap[item.status] || '待处理';
            saveRepairs(repairs);
            renderList();
        }

        // ============================================================
        // 5. 提交表单
        // ============================================================
        document.getElementById('repairForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // 获取表单数据
            const reporter = document.getElementById('reporter').value.trim();
            const room = document.getElementById('room').value.trim();
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value.trim();
            const urgency = document.getElementById('urgency').value;

            // 简单校验
            if (!reporter || !room || !description) {
                alert('请完整填写报修人、房间号和故障描述！');
                return;
            }

            // 构造报修对象
            const newRepair = {
                id: generateId(),
                reporter: reporter,
                room: room,
                category: category,
                description: description,
                urgency: urgency,
                status: '待处理',
                time: new Date().toLocaleString('zh-CN')
            };

            // 保存到 localStorage
            const repairs = getRepairs();
            repairs.push(newRepair);
            saveRepairs(repairs);

            // 清空表单
            document.getElementById('reporter').value = '';
            document.getElementById('room').value = '';
            document.getElementById('description').value = '';
            document.getElementById('category').value = '家具';
            document.getElementById('urgency').value = '中';

            // 重新渲染列表
            renderList();

            // 给出反馈
            alert('✅ 报修提交成功！');
        });

        // ============================================================
        // 6. 页面加载时渲染
        // ============================================================
        renderList();
    </script>
</body>
</html>
